<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VERYFUNGAMES!!!</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="poo" class="black"></div>

<img 
    id="poo2"
    src="enter.png"
    class="centered"
    onclick="startExperience()"
    alt="Enter"
>

<footer id="contact" class="footer">
    For questions or concerns, please email
    <br>
    <a href="mailto:iskscratmango@proton.me">
        iskscratmango@proton.me
    </a>
</footer>

<div id="credits" class="credits">
    🎵 "It's in Your Head Until You're Dead! (Worst Song)" — Nathan Barnatt
    <br>
    Video used with permission.
</div>

<video id="fart" preload src="thisverseisacurse.mp4"></video>

<div id="popup-container"></div>


<script>

function startExperience() {

    document.getElementById("poo").remove();
    document.getElementById("poo2").remove();
    document.getElementById("contact").remove();
    document.getElementById("credits").remove();


    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }


    document.getElementById("fart").play();

    createPopups();
}


function createPopups() {

    const container = document.getElementById("popup-container");
    let popups = [];


    for (let i = 0; i < 200; i++) {

        let popup = document.createElement("div");

        popup.className = "popup";
        popup.innerText = "THIS VERSE IS A CURSE!!!";

        container.appendChild(popup);


        popups.push({
            element: popup,
            x: Math.random() * (window.innerWidth - 260),
            y: Math.random() * (window.innerHeight - 90),
            dx: 30 + Math.random() * 20,
            dy: 30 + Math.random() * 20
        });
    }


    function move() {

        popups.forEach(p => {

            p.x += p.dx;
            p.y += p.dy;


            if (p.x <= 0 || p.x >= window.innerWidth - 260) {
                p.dx *= -1;
            }

            if (p.y <= 0 || p.y >= window.innerHeight - 90) {
                p.dy *= -1;
            }


            p.element.style.left = p.x + "px";
            p.element.style.top = p.y + "px";

        });


        requestAnimationFrame(move);
    }


    move();
}

</script>

</body>
</html>
