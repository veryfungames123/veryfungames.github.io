<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>

<img onclick="startExperience()" id="poo2" src="enter.png" class="centered">

<video id="fart" preload src="thisverseisacurse.mp4"></video>

<div id="poo" class="black"></div>

<div id="popup-container"></div>

<h1>Loading...</h1>


<script>

function startExperience() {

    document.getElementById("poo").remove();
    document.getElementById("poo2").remove();

    // Enter fullscreen after clicking
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    // Play video once
    let video = document.getElementById("fart");
    video.play();

    createPopups();
}


function createPopups() {

    const container = document.getElementById("popup-container");

    let popups = [];

    for (let i = 0; i < 5; i++) {

        let popup = document.createElement("div");

        popup.className = "popup";
        popup.innerText = "THIS VERSE IS A CURSE!!!";

        container.appendChild(popup);

        popups.push({
            element: popup,
            x: Math.random() * (window.innerWidth - 250),
            y: Math.random() * (window.innerHeight - 80),

            // EXTREMELY FAST SPEED
            dx: 30 + Math.random() * 20,
            dy: 30 + Math.random() * 20
        });
    }


    function movePopups() {

        popups.forEach(p => {

            p.x += p.dx;
            p.y += p.dy;


            if (p.x <= 0 || p.x >= window.innerWidth - 250) {
                p.dx *= -1;
            }

            if (p.y <= 0 || p.y >= window.innerHeight - 80) {
                p.dy *= -1;
            }


            p.element.style.left = p.x + "px";
            p.element.style.top = p.y + "px";

        });


        requestAnimationFrame(movePopups);
    }


    movePopups();
}

</script>

</body>
</html>
